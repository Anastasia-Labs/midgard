name: Midgard Node CI

on:
  push:
    branches: ["main"]
    paths:
      - "demo/midgard-node/**"
      - ".github/workflows/midgard-node-ci.yml"
  pull_request:
    paths:
      - "demo/midgard-node/**"
      - ".github/workflows/midgard-node-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: midgard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d midgard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      L1_PROVIDER: Kupmios
      L1_BLOCKFROST_API_URL: https://blockfrost.invalid
      L1_BLOCKFROST_KEY: test-key
      L1_OGMIOS_KEY: http://127.0.0.1:1337
      L1_KUPO_KEY: http://127.0.0.1:1442
      L1_OPERATOR_SEED_PHRASE: "panther fly crawl express smile lend company blue slogan dawn wall tip angle tomorrow battle myth category vanish misery ocean include salon wood rail"
      L1_OPERATOR_SEED_PHRASE_FOR_MERGE_TX: "second salad helmet humble left noise inform person swamp surround twice animal fitness sing laundry saddle stove guess cabin rural kidney reject oil fee"
      NETWORK: Preprod
      RUN_GENESIS_ON_STARTUP: "false"
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: midgard
      TESTNET_GENESIS_WALLET_SEED_PHRASE_A: "panther fly crawl express smile lend company blue slogan dawn wall tip angle tomorrow battle myth category vanish misery ocean include salon wood rail"
      TESTNET_GENESIS_WALLET_SEED_PHRASE_B: "second salad helmet humble left noise inform person swamp surround twice animal fitness sing laundry saddle stove guess cabin rural kidney reject oil fee"
      TESTNET_GENESIS_WALLET_SEED_PHRASE_C: "cactus chalk grit reopen true slight whale sand law sibling silver fringe cement twist process bracket history leopard churn federal coral three hockey fossil"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: demo/midgard-node/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir demo/midgard-node install --frozen-lockfile
      - name: Run tests
        run: pnpm --dir demo/midgard-node test
